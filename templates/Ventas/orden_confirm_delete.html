<!DOCTYPE html>
<html lang="es">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0">
    <title>Cancelar Orden</title>
    <script src="https://cdn.tailwindcss.com"></script>
    <link href="https://fonts.googleapis.com/css2?family=Roboto+Mono:wght@400;700&display=swap" rel="stylesheet">
    <style>body { font-family: 'Roboto Mono', monospace; }</style>
</head>
<body class="bg-gray-900 text-gray-100 min-h-screen flex items-center justify-center p-4">

    <div class="w-full max-w-md bg-gray-800 rounded-lg shadow-2xl border-t-4 border-red-600 p-8 text-center relative overflow-hidden">
        
        <!-- Fondo decorativo de alerta -->
        <div class="absolute top-0 left-0 w-full h-full bg-red-500 opacity-5 pointer-events-none"></div>

        <div class="mx-auto flex items-center justify-center h-20 w-20 rounded-full bg-red-900/50 mb-6 border-2 border-red-500/30">
            <svg class="h-10 w-10 text-red-500" fill="none" viewBox="0 0 24 24" stroke="currentColor">
                <path stroke-linecap="round" stroke-linejoin="round" stroke-width="2" d="M19 7l-.867 12.142A2 2 0 0116.138 21H7.862a2 2 0 01-1.995-1.858L5 7m5 4v6m4-6v6m1-10V4a1 1 0 00-1-1h-4a1 1 0 00-1 1v3M4 7h16" />
            </svg>
        </div>

        <h2 class="text-3xl font-bold mb-2 text-white">¿Cancelar Orden?</h2>
        
        <div class="bg-gray-900/50 rounded p-4 mb-8 mt-4 border border-gray-700">
            <p class="text-gray-400 text-sm uppercase tracking-widest mb-1">Orden #{{ object.id }}</p>
            <p class="text-xl font-bold text-white">{{ object.cliente_nombre }}</p>
            <p class="text-orange-500 font-bold mt-1">${{ object.total }}</p>
        </div>

        <p class="text-gray-400 mb-8 text-sm">
            Esta acción es irreversible. La orden desaparecerá del tablero del Chef.
        </p>

        <form method="post" class="flex gap-4">
            {% csrf_token %}
            
            <a href="{% url 'orden_list' %}" class="flex-1 py-4 bg-gray-700 hover:bg-gray-600 rounded-lg font-bold text-gray-300 transition uppercase tracking-wider">
                Volver
            </a>
            
            <button type="submit" class="flex-1 py-4 bg-red-600 hover:bg-red-700 rounded-lg font-bold text-white shadow-lg transition uppercase tracking-wider flex justify-center items-center gap-2">
                <svg class="w-5 h-5" fill="none" stroke="currentColor" viewBox="0 0 24 24"><path stroke-linecap="round" stroke-linejoin="round" stroke-width="2" d="M10 14l2-2m0 0l2-2m-2 2l-2-2m2 2l2 2m7-2a9 9 0 11-18 0 9 9 0 0118 0z"></path></svg>
                Confirmar
            </button>
        </form>
    </div>

</body>
</html>
