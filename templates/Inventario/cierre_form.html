<!DOCTYPE html>
<html lang="es">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0, maximum-scale=1.0, user-scalable=no">
    <title>Corte de Caja</title>
    <script src="https://cdn.tailwindcss.com"></script>
    <link href="https://fonts.googleapis.com/css2?family=Roboto+Mono:wght@400;700&display=swap" rel="stylesheet">
    <style>body { font-family: 'Roboto Mono', monospace; }</style>
</head>
<body class="bg-gray-900 text-gray-100 min-h-screen flex flex-col items-center justify-center p-0 md:p-4">

    <!-- NAVBAR MÓVIL -->
    <nav class="w-full bg-gray-800 p-4 border-b border-gray-700 flex justify-between items-center md:hidden sticky top-0 z-20">
        <h1 class="text-lg font-bold text-yellow-400">Corte de Caja</h1>
        <a href="{% url 'start_home' %}" class="text-gray-400">Cancelar</a>
    </nav>

    <div class="w-full max-w-lg bg-gray-900 md:bg-gray-800 md:rounded-xl md:shadow-2xl border-t md:border border-gray-700 p-6 md:p-8 flex-grow md:flex-grow-0">
        
        <div class="hidden md:flex items-center gap-3 mb-6 border-b border-gray-700 pb-4">
            <div class="bg-yellow-600/20 p-3 rounded-lg border border-yellow-600/50">
                <svg class="w-8 h-8 text-yellow-500" fill="none" stroke="currentColor" viewBox="0 0 24 24"><path stroke-linecap="round" stroke-linejoin="round" stroke-width="2" d="M12 8c-1.657 0-3 .895-3 2s1.343 2 3 2 3 .895 3 2-1.343 2-3 2m0-8c1.11 0 2.08.402 2.599 1M12 8V7m0 1v8m0 0v1m0-1c-1.11 0-2.08-.402-2.599-1M21 12a9 9 0 11-18 0 9 9 0 0118 0z"></path></svg>
            </div>
            <div>
                <h2 class="text-2xl font-bold text-white">Cierre de Turno</h2>
                <p class="text-xs text-gray-400 uppercase tracking-widest">{{ user.username|upper }}</p>
            </div>
        </div>

        <form method="post" class="space-y-6" id="cierreForm">
            {% csrf_token %}
            
            <!-- TARJETA COMPARATIVA -->
            <div class="bg-gray-800 md:bg-gray-900/50 p-4 rounded-xl border border-gray-700 grid grid-cols-1 gap-6">
                
                <!-- LO QUE DICE EL SISTEMA -->
                <div class="text-center">
                    <label class="block text-gray-500 text-xs uppercase font-bold mb-1">Ventas Totales (Sistema)</label>
                    <div class="relative">
                        <span class="absolute left-3 top-3 text-gray-400">$</span>
                        {{ form.ventas_totales_sistema }}
                    </div>
                    <p class="text-[10px] text-gray-500 mt-1">Calculado automáticamente de órdenes entregadas hoy.</p>
                </div>

                <div class="border-t border-gray-700"></div>

                <!-- LO QUE CUENTA EL CAJERO -->
                <div class="text-center">
                    <label class="block text-green-500 text-sm uppercase font-bold mb-2">¿Cuánto efectivo tienes?</label>
                    <div class="relative">
                        <span class="absolute left-4 top-4 text-green-500 text-xl font-bold">$</span>
                        {{ form.efectivo_en_caja }}
                    </div>
                    <p class="text-[10px] text-yellow-500 mt-2" id="msgDiferencia">Ingresa el monto para calcular diferencia</p>
                </div>
            </div>

            <!-- OBSERVACIONES -->
            <div>
                <label class="block text-gray-500 text-xs uppercase font-bold mb-2">Observaciones / Incidencias</label>
                {{ form.observaciones }}
            </div>

            <!-- BOTONES -->
            <div class="flex gap-3 pt-4 border-t border-gray-700">
                <a href="{% url 'start_home' %}" class="w-1/3 py-4 bg-gray-700 hover:bg-gray-600 text-center rounded-xl font-bold text-gray-400 transition">
                    Salir
                </a>
                <button type="submit" class="w-2/3 py-4 bg-yellow-600 hover:bg-yellow-500 rounded-xl font-bold text-black shadow-lg shadow-yellow-900/50 transition">
                    Cerrar Caja
                </button>
            </div>
        </form>
    </div>

    <!-- SCRIPT SIMPLE PARA CALCULAR DIFERENCIA EN VIVO -->
    <script>
        const inputSistema = document.querySelector('input[name="ventas_totales_sistema"]');
        const inputReal = document.querySelector('input[name="efectivo_en_caja"]');
        const msg = document.getElementById('msgDiferencia');

        inputReal.addEventListener('input', function() {
            const sistema = parseFloat(inputSistema.value) || 0;
            const real = parseFloat(this.value) || 0;
            const dif = real - sistema;

            if (dif === 0) {
                msg.textContent = "✅ Caja Cuadrada Perfectamente";
                msg.className = "text-[10px] text-green-400 mt-2 font-bold";
            } else if (dif > 0) {
                msg.textContent = `⚠️ Sobran $${dif.toFixed(2)}`;
                msg.className = "text-[10px] text-blue-400 mt-2 font-bold";
            } else {
                msg.textContent = `⛔ Faltan $${Math.abs(dif).toFixed(2)}`;
                msg.className = "text-[10px] text-red-400 mt-2 font-bold animate-pulse";
            }
        });
    </script>

</body>
</html>
