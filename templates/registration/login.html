<!DOCTYPE html>
<html lang="es">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0">
    <title>Iniciar Sesión - FoodTruck</title>
    <script src="https://cdn.tailwindcss.com"></script>
    <link href="https://fonts.googleapis.com/css2?family=Roboto+Mono:wght@400;700&display=swap" rel="stylesheet">
    <style>body { font-family: 'Roboto Mono', monospace; }</style>
</head>
<body class="bg-gray-900 flex items-center justify-center min-h-screen">

    <div class="bg-white p-8 rounded-lg shadow-2xl w-full max-w-md border-t-8 border-orange-500">
        
        <div class="text-center mb-8">
            <h2 class="text-3xl font-black text-gray-800 uppercase tracking-tighter">Acceso RutaDelSabor</h2>
            <p class="text-gray-500 text-sm mt-2">Sistema de Gestión de Pedidos</p>
        </div>

        <form method="post" class="space-y-6">
            {% csrf_token %}
            
            <!-- Manejo de Errores -->
            {% if form.errors %}
            <div class="bg-red-100 border-l-4 border-red-500 text-red-700 p-4 mb-4" role="alert">
                <p class="font-bold">Error de acceso</p>
                <p>Usuario o contraseña incorrectos.</p>
            </div>
            {% endif %}

            <!-- Campo Usuario -->
            <div>
                <label class="block text-gray-700 text-sm font-bold mb-2 uppercase" for="id_username">
                    Usuario
                </label>
                <input type="text" name="username" autofocus required id="id_username" 
                    class="shadow appearance-none border rounded w-full py-3 px-3 text-gray-700 leading-tight focus:outline-none focus:ring-2 focus:ring-orange-500 bg-gray-50">
            </div>

            <!-- Campo Contraseña -->
            <div>
                <label class="block text-gray-700 text-sm font-bold mb-2 uppercase" for="id_password">
                    Contraseña
                </label>
                <input type="password" name="password" required id="id_password" 
                    class="shadow appearance-none border rounded w-full py-3 px-3 text-gray-700 leading-tight focus:outline-none focus:ring-2 focus:ring-orange-500 bg-gray-50">
            </div>

            <!-- Botón Entrar -->
            <button type="submit" 
                class="w-full bg-gray-900 hover:bg-gray-800 text-white font-bold py-4 px-4 rounded focus:outline-none focus:shadow-outline uppercase tracking-widest transition transform hover:-translate-y-1">
                Iniciar Turno
            </button>
        </form>
        
        <div class="mt-6 text-center">
            <p class="text-xs text-gray-400">Si olvidaste tu contraseña, contacta al Administrador.</p>
        </div>
    </div>

</body>
</html>
