<!DOCTYPE html>
<html lang="es">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0, maximum-scale=1.0, user-scalable=no">
    <title>Acceso - FoodTruck</title>
    <script src="https://cdn.tailwindcss.com"></script>
    <link href="https://fonts.googleapis.com/css2?family=Roboto+Mono:wght@400;700&display=swap" rel="stylesheet">
    <style>
        body { font-family: 'Roboto Mono', monospace; }
        /* Evita el zoom automático en inputs en iOS */
        input { font-size: 16px !important; }
    </style>
</head>
<body class="bg-gray-900 flex flex-col items-center justify-center min-h-[100dvh] p-4">

    <!-- Tarjeta Principal -->
    <div class="w-full max-w-sm bg-gray-800 rounded-2xl shadow-2xl overflow-hidden border border-gray-700 relative">
        
        <!-- Decoración Superior -->
        <div class="h-2 bg-gradient-to-r from-orange-500 via-red-500 to-orange-500"></div>

        <div class="p-6 md:p-8">
            
            <!-- Encabezado / Logo -->
            <div class="text-center mb-8">
                <div class="inline-flex items-center justify-center w-16 h-16 rounded-full bg-gray-700 mb-4 border border-gray-600 shadow-inner">
                    <svg class="w-8 h-8 text-orange-500" fill="none" stroke="currentColor" viewBox="0 0 24 24"><path stroke-linecap="round" stroke-linejoin="round" stroke-width="2" d="M13 10V3L4 14h7v7l9-11h-7z"></path></svg>
                </div>
                <h2 class="text-2xl font-bold text-white uppercase tracking-tight">Ruta del Sabor</h2>
                <p class="text-gray-400 text-xs mt-1 uppercase tracking-widest">Sistema Gestor De Pedidos</p>
            </div>

            <form method="post" class="space-y-5">
                {% csrf_token %}
                
                <!-- Manejo de Errores -->
                {% if form.errors %}
                <div class="bg-red-500/10 border border-red-500/50 text-red-200 p-3 rounded-lg text-sm flex items-start gap-2 animate-pulse" role="alert">
                    <svg class="w-5 h-5 flex-shrink-0 mt-0.5" fill="none" stroke="currentColor" viewBox="0 0 24 24"><path stroke-linecap="round" stroke-linejoin="round" stroke-width="2" d="M12 8v4m0 4h.01M21 12a9 9 0 11-18 0 9 9 0 0118 0z"></path></svg>
                    <div>
                        <p class="font-bold">Acceso Denegado</p>
                        <p class="opacity-80">Credenciales incorrectas.</p>
                    </div>
                </div>
                {% endif %}

                <!-- Campo Usuario -->
                <div class="space-y-1">
                    <label class="block text-gray-400 text-xs font-bold uppercase ml-1" for="id_username">
                        Usuario
                    </label>
                    <div class="relative">
                        <div class="absolute inset-y-0 left-0 pl-3 flex items-center pointer-events-none">
                            <svg class="h-5 w-5 text-gray-500" fill="none" stroke="currentColor" viewBox="0 0 24 24"><path stroke-linecap="round" stroke-linejoin="round" stroke-width="2" d="M16 7a4 4 0 11-8 0 4 4 0 018 0zM12 14a7 7 0 00-7 7h14a7 7 0 00-7-7z"></path></svg>
                        </div>
                        <input type="text" name="username" autofocus required id="id_username" placeholder="Tu usuario"
                            class="block w-full pl-10 pr-3 py-3 bg-gray-900 border border-gray-600 rounded-lg text-white placeholder-gray-600 focus:outline-none focus:ring-2 focus:ring-orange-500 focus:border-transparent transition appearance-none">
                    </div>
                </div>

                <!-- Campo Contraseña -->
                <div class="space-y-1">
                    <label class="block text-gray-400 text-xs font-bold uppercase ml-1" for="id_password">
                        Contraseña
                    </label>
                    <div class="relative">
                        <div class="absolute inset-y-0 left-0 pl-3 flex items-center pointer-events-none">
                            <svg class="h-5 w-5 text-gray-500" fill="none" stroke="currentColor" viewBox="0 0 24 24"><path stroke-linecap="round" stroke-linejoin="round" stroke-width="2" d="M12 15v2m-6 4h12a2 2 0 002-2v-6a2 2 0 00-2-2H6a2 2 0 00-2 2v6a2 2 0 002 2zm10-10V7a4 4 0 00-8 0v4h8z"></path></svg>
                        </div>
                        <input type="password" name="password" required id="id_password" placeholder="••••••••"
                            class="block w-full pl-10 pr-3 py-3 bg-gray-900 border border-gray-600 rounded-lg text-white placeholder-gray-600 focus:outline-none focus:ring-2 focus:ring-orange-500 focus:border-transparent transition appearance-none">
                    </div>
                </div>

                <!-- Botón Entrar -->
                <button type="submit" 
                    class="w-full bg-gradient-to-r from-orange-600 to-red-600 hover:from-orange-500 hover:to-red-500 text-white font-bold py-4 px-4 rounded-xl shadow-lg transform active:scale-95 transition uppercase tracking-wider flex justify-center items-center gap-2 mt-4">
                    <span>Iniciar Turno</span>
                    <svg class="w-5 h-5" fill="none" stroke="currentColor" viewBox="0 0 24 24"><path stroke-linecap="round" stroke-linejoin="round" stroke-width="2" d="M13 5l7 7-7 7M5 5l7 7-7 7"></path></svg>
                </button>
            </form>
            
            <div class="mt-8 text-center border-t border-gray-700 pt-4">
                <p class="text-[10px] text-gray-500">¿Problemas para acceder? <br> Contacta al administrador del sistema.</p>
            </div>
        </div>
    </div>
    
    <!-- Footer discreto -->
    <p class="text-gray-600 text-[10px] mt-8 opacity-50">
        &copy; 2026 FoodTruck System v1.0
    </p>

</body>
</html>
